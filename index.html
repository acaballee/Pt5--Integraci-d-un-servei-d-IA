<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartReceipt AI - Asistent Financer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>SmartReceipt <span class="badge">PT5 IA</span></h1>
            <p>Converteix els teus tiquets en dades estructurades amb el poder de la IA.</p>
        </header>

        <div class="grid">
            <!-- Left Column: Config & Input -->
            <div class="column">
                <section class="card" style="margin-bottom: 2rem;">
                    <h2>
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        Configuració
                    </h2>
                    <div class="form-group">
                        <label for="provider">Proveïdor de IA (Strategy)</label>
                        <select id="provider">
                            <option value="gemini">Google Gemini (Flash 1.5)</option>
                            <option value="grok">xAI (Grok)</option>
                        </select>
                    </div>
                </section>

                <section class="card">
                    <h2>
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Entrada de Tiquet
                    </h2>
                    <div class="form-group">
                        <label for="receiptText">Text del tiquet (OCR Simulat)</label>
                        <textarea id="receiptText" rows="10" placeholder="Enganxa aquí el text extret del tiquet... Ex: REPSOL Tortosa, 45.50€..."></textarea>
                        <div style="margin-top: 0.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
                            <button type="button" class="btn-example" data-text="REPSOL TORTOSA\nCtra. de Tortosa a l'Aldea, s/n\n43500 Tortosa\n--------------------------------\nGASOLINA S/P 95: 45,50 €\n--------------------------------\nTOTAL: 45,50 €\nData: 26/03/2026 14:30">⛽ Repsol</button>
                            <button type="button" class="btn-example" data-text="MERCADONA S.A.\nAv. de la Generalitat, 120\n--------------------------------\nLLET 6U: 5,40 €\nPA DE MOLDE: 1,20 €\nPOMES 1KG: 2,30 €\n--------------------------------\nTOTAL: 8,90 €\nData: 10/04/2026 09:15">🛒 Mercadona</button>
                            <button type="button" class="btn-example" data-text="RESTAURANT CAN TONET\nPlaça de l'Ajuntament, 5\n--------------------------------\nMENÚ DEL DIA: 15,00 €\nAIGUA 0.5L: 2,00 €\n--------------------------------\nTOTAL: 17,00 €\nData: 15/04/2026 21:00">🍽️ Restaurant</button>
                        </div>
                    </div>
                    <button id="btnProcess">
                        <span class="btn-text">Processar amb IA</span>
                        <div class="loader" id="loader"></div>
                    </button>
                    <div class="status-error" id="errorMsg"></div>
                </section>
            </div>

            <!-- Right Column: Results -->
            <div class="column">
                <section class="card results-area" id="resultsCard">
                    <h2>
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                        Dades Extretes
                    </h2>
                    <div id="placeholder" class="placeholder">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        <p>Esperant dades per analitzar...</p>
                    </div>
                    <div id="resultsContent" style="display: none;">
                        <div class="data-grid">
                            <div class="data-item">
                                <div class="data-label">Establiment</div>
                                <div class="data-value" id="resEstablishment">-</div>
                            </div>
                            <div class="data-item">
                                <div class="data-label">Data</div>
                                <div class="data-value" id="resDate">-</div>
                            </div>
                            <div class="data-item">
                                <div class="data-label">Total</div>
                                <div class="data-value" style="color: var(--accent);" id="resTotal">0.00 €</div>
                            </div>
                            <div class="data-item">
                                <div class="data-label">Categoria</div>
                                <div class="data-value" id="resCategory">-</div>
                            </div>
                        </div>
                        <div class="items-list" id="resItems">
                            <!-- Items will be injected here -->
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
